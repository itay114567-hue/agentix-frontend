<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Agentix | AI Agents for Customer Service Automation</title>
    <meta name="description" content="Agentix deploys intelligent AI agents that handle every customer interaction — WhatsApp, email, chat & voice — replacing the need for human representatives at scale. Cut support costs by up to 70%." />
    <meta name="keywords" content="AI customer service, customer service automation, AI agents, WhatsApp bot, support automation, CX automation, conversational AI" />
    <meta name="author" content="Agentix Technologies Ltd." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://agentix.ai/" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agentix.ai/" />
    <meta property="og:title" content="Agentix | AI Agents for Customer Service" />
    <meta property="og:description" content="Handle every customer interaction automatically — WhatsApp, email, chat & voice. Cut support costs by 70% while improving CSAT." />
    <meta property="og:image" content="https://agentix.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Agentix — AI Customer Service Platform" />
    <meta property="og:site_name" content="Agentix" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@agentixai" />
    <meta name="twitter:title" content="Agentix | AI Agents for Customer Service" />
    <meta name="twitter:description" content="Handle every customer interaction automatically — WhatsApp, email, chat & voice. Cut support costs by 70%." />
    <meta name="twitter:image" content="https://agentix.ai/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Agentix",
      "url": "https://agentix.ai",
      "description": "AI-powered customer service automation platform",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "499",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Agentix Technologies Ltd.",
        "url": "https://agentix.ai"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
